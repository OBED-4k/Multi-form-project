<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>
<body class="max-w-6xl m-auto lg:w-250 rounded-md lg:h-80 bg-[#DAE0F3]">

    <section class="lg:flex lg:flex-row bg-transparent lg:bg-white lg:p-3 ">
        <!-- LEFT SIDE-->
         <div class="lg:gap-3 flex items-center pb-22 justify-center lg:block gap-8 lg:bg-[url('./assets/images/bg-sidebar-desktop.svg')] font-[Ubuntu] bg-[url('./assets/images/bg-sidebar-mobile.svg')] h-50 w-98 lg:bg-center lg:p-10 bg-cover bg-no-repeat lg:w-[320px] lg:h-[600px] lg:rounded-[12px]">
            <div class="lg:flex lg:gap-3 flex">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full bg-[#B4D9FF] flex justify-center items-center font-semibold">1</p>
                <div class="hidden lg:block flex flex-col">
                <p class="lg:text-sm font-semibold text-[#959BB4]">STEP 1</p>
                <p class="text-white font-bold">YOUR INFO</p>
            </div>
            </div>

            <div class="lg:flex lg:gap-3 lg:pt-6">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full border-2 border-white flex justify-center items-center font-semibold text-white">2</p>
                <div class="hidden lg:block flex flex-col">
                <p class="lg:text-sm font-semibold text-[#959BB4]">STEP2</p>
                <p class="text-white font-bold">SELECT PLAN</p></div>
            </div>

            <div class="flex lg:gap-3 lg:pt-6">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full border-2 border-white flex justify-center items-center font-semibold text-white">3</p>
                <div class="hidden lg:block flex flex-col">
                <p class="text-sm font-semibold text-[#959BB4]">STEP3</p>
                <p class="text-white font-bold">ADD-ONS</p>
                </div>
            </div>

            <div class="lg:flex lg:gap-3 lg:pt-6">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full border-2 border-white flex justify-center items-center font-semibold text-white">4</p>
                <div class="hidden lg:block flex flex-col">
                <p class="text-sm font-semibold text-[#959BB4]">STEP4</p>
                <p class="text-white font-bold">SUMMARY</p>
               </div>
            </div>
         </div>
         
             <!-- RIGHT SIDE-->
             <form class="-mt-21 lg:mt-0 lg:flex p-6 lg:mx-0 mx-5 lg:mx-0 flex lg:gap-2 rounded-xl bg-white lg:pl-30 lg:pt-8 flex-col font-[Ubuntu]">
                 <div class=" flex flex-col lg:gap-3 gap-3">
                     <p class=" text-[#062359] font-bold text-3xl">Personal info</p>
                     <p class="text-[#959BB4] font-semibold">Please provide your name, email address, and phone number.</p>
                    </div>
                    <div class="lg:pt-2 lg:px-3 pt-6 flex flex-col lg:gap-2 lg:pt-9">
                        <label class="text-[#062359] lg:pb-1 text-sm font-semibold" for="Name">Name</label>
                        <input class="border-1 w-full h-10 p-2 lg:h-12 lg:p-3 rounded-md border-[#959BB4]" id="Name" placeholder="e.g.Stephen King" type="text">
                        <p id="use"></p>   <!-- name -->
                        <label class="text-[#062359] lg:pt-2 pt-5 font-semibold" for="Email">Email Address</label>
                        <input class="border-1 w-full h-10 p-2 lg:h-12 lg:p-3 rounded-md border-[#959BB4]" id="Email" placeholder="e.g.stephenking@lorem.com" type="text">
                        <p id="ema"></p>   <!-- email -->  
                        <label class="text-[#062359] text-sm pt-4 lg:pt-3 font-semibold" for="Number">Phone Number</label>
                        <input class="border-1 w-full h-10 p-2 lg:h-12 lg:p-3 rounded-md border-[#959BB4]" id="Number" placeholder="e.g.+1234567890" type="tel">
                        <p id="num"></p>   <!-- number -->
                    </div>
                    <div class="lg:flex lg:block hidden lg:pr-3 lg:pt-18 lg:justify-end">
                        <button class="border hover:bg-blue-500 rounded-md w-26 h-10 text-sm text-white bg-[#062359]" type="submit">Next Step</button>
                    </div>
                </form>
            </section>
            <div class="fixed bottom-0 lg:hidden left-0 w-full bg-white p-4 flex justify-end">
             <button class="mobile-btn bg-[#062359] text-white px-5 py-2 rounded-md">Next Step</button>
            </div>
        <script src="./M.js"></script>
</body>
</html>
