<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">


</head>
<body class="max-w-6xl m-auto lg:w-250 rounded-md lg:h-80 bg-[#DAE0F3]">
 <section class="lg:flex lg:flex-row bg-transparent lg:bg-white lg:p-3 ">
    
   
   <!-- LEFT SIDE-->
         <div class="lg:gap-3 flex items-center pb-22 justify-center lg:block gap-8 lg:bg-[url('./assets/images/bg-sidebar-desktop.svg')] font-[Ubuntu] bg-[url('./assets/images/bg-sidebar-mobile.svg')] h-50 w-98 lg:bg-center lg:p-10 bg-cover bg-no-repeat lg:w-[320px] lg:h-[600px] lg:rounded-[12px]">
            <div class="lg:flex lg:gap-3 flex">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full border-2 text-white border-white flex justify-center items-center font-semibold">1</p>
                <div class="hidden lg:block flex flex-col">
                <p class="lg:text-sm font-semibold text-[#959BB4]">STEP 1</p>
                <p class="text-white font-bold">YOUR INFO</p>
            </div>
            </div>

            <div class="lg:flex lg:gap-3 lg:pt-6">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full bg-[#B4D9FF] flex justify-center items-center font-semibold text-[#062359]">2</p>
                <div class="hidden lg:block flex flex-col">
                <p class="lg:text-sm font-semibold text-[#959BB4]">STEP 2</p>
                <p class="text-white font-bold">SELECT PLAN</p></div>
            </div>

            <div class="flex lg:gap-3 lg:pt-6">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full border-2 border-white flex justify-center items-center font-semibold text-white">3</p>
                <div class="hidden lg:block flex flex-col">
                <p class="text-sm font-semibold text-[#959BB4]">STEP 3</p>
                <p class="text-white font-bold">ADD-ONS</p>
                </div>
            </div>

            <div class="lg:flex lg:gap-3 lg:pt-6">
                <p class="lg:w-8 lg:h-8 w-9 h-9 rounded-full border-2 border-white flex justify-center items-center font-semibold text-white">4</p>
                <div class="hidden lg:block flex flex-col">
                <p class="text-sm font-semibold text-[#959BB4]">STEP 4</p>
                <p class="text-white font-bold">SUMMARY</p>
               </div>
            </div>
         </div>


         <!-- RIGHT SIDE-->
         <div class="flex flex-col">
            <p class=" text-[#062359] font-bold text-3xl">Select your plan</p>
            <p class="text-[#959BB4] font-semibold">You have option of monthly or yearly billing.</p>
            
            <div class="flex flex-col">
             <div class="flex flex-row">
                <div class=" border-1 border-purple-600 flex flex-col p-6" >
                <img class="flex justify-start" src="./assets/images/icon-arcade.svg" alt="">
                <p>Arcade</p>
                <p>$9/mo</p>
             </div>

             <div>
                <img src="./assets/images/icon-advanced.svg" alt="">
                <p>Advanced</p>
                <p>$12/mo</p>
             </div>

             <div>
                <img src="./assets/images/icon-pro.svg" alt="">
                <p>Pro</p>
                <p>$15/mo</p>
             </div>
            </div>

             <div>
                <p>Monthly</p>
                <img src="./assets/images/icon-right switch.svg" alt="">
                <p>Yearly</p>
             </div>

             <div>
                <a href="./index.html">Go Back</a>
                <button class="border-2 rounded-md mx-13 bg-[#062359] w-[30%]" type="submit">Next Step</button>
             </div>

            </div>
         </div>

    </section>
</body>
</html>
